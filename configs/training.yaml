# Training Configuration
training:
  batch_size: 16
  epochs: 30
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  seed: 42

# Optimizer
optimizer:
  type: adamw
  betas: [0.9, 0.999]
  eps: 1e-8

# Scheduler
scheduler:
  type: linear_warmup
  num_warmup_steps: 500

# Early stopping
early_stopping:
  patience: 5
  monitor: val_loss
  mode: min

# Checkpointing
checkpoint:
  save_best: true
  save_every: 5
  path: models/checkpoints
