project:
  name: "smell-to-molecule"
  version: "0.1.0"
  random_seed: 42

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

model:
  name: "neobert-base"
  max_length: 128
  num_chemicals: 300
  hidden_dim: 512
  dropout: 0.1

training:
  batch_size: 16
  epochs: 20
  learning_rate: 2e-5
  warmup_steps: 500
  weight_decay: 0.01
  gradient_clip: 1.0
  
evaluation:
  top_k: [1, 3, 5, 10]
  metrics: ["precision", "recall", "map", "ndcg", "f1"]
